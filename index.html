<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crypto Market Engine</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      min-height: 100vh;
      padding: 20px;
      overflow-x: hidden;
    }

    .terminal {
      max-width: 860px;
      margin: 0 auto;
    }

    /* ── Header ───────────────────────────────────── */
    .header {
      border: 1px solid #2a2a2a;
      padding: 12px 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-title { color: #00ff88; font-size: 14px; letter-spacing: 2px; }
    .header-meta { color: #555; font-size: 11px; margin-left: auto; }

    /* ── Hamburger button ─────────────────────────── */
    .burger {
      width: 32px;
      height: 32px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: 1px solid #2a2a2a;
      padding: 4px;
      transition: border-color 0.2s;
      flex-shrink: 0;
    }

    .burger:hover { border-color: #00ff88; }
    .burger span {
      display: block;
      width: 18px;
      height: 1.5px;
      background: #888;
      transition: all 0.3s;
    }
    .burger:hover span { background: #00ff88; }

    .burger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .burger.open span:nth-child(2) { opacity: 0; }
    .burger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    /* ── Sidebar ──────────────────────────────────── */
    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 90;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .sidebar-overlay.open { opacity: 1; pointer-events: all; }

    .sidebar {
      position: fixed;
      top: 0;
      left: -280px;
      width: 280px;
      height: 100%;
      background: #0d0d0d;
      border-right: 1px solid #2a2a2a;
      z-index: 100;
      transition: left 0.3s ease;
      display: flex;
      flex-direction: column;
      padding: 20px 0;
    }
    .sidebar.open { left: 0; }

    .sidebar-header {
      padding: 12px 20px 20px;
      border-bottom: 1px solid #1e1e1e;
      margin-bottom: 8px;
    }
    .sidebar-header span {
      color: #00ff88;
      font-size: 12px;
      letter-spacing: 2px;
    }

    .sidebar-section {
      padding: 8px 20px 4px;
      font-size: 10px;
      letter-spacing: 2px;
      color: #333;
      text-transform: uppercase;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      cursor: pointer;
      color: #888;
      font-size: 13px;
      letter-spacing: 0.5px;
      transition: all 0.15s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: inherit;
      text-decoration: none;
    }
    .sidebar-item:hover { color: #e0e0e0; background: #151518; }
    .sidebar-item.active { color: #00ff88; }
    .sidebar-item .icon { font-size: 16px; width: 20px; text-align: center; }
    .sidebar-item .arrow { margin-left: auto; color: #333; font-size: 11px; }

    .sidebar-sub {
      display: block;
      padding: 6px 20px 6px 50px;
      cursor: pointer;
      color: #666;
      font-size: 12px;
      transition: all 0.15s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: inherit;
      text-decoration: none;
    }
    .sidebar-sub:hover { color: #e0e0e0; background: #151518; }

    /* ── Tabs ─────────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 0;
      flex-wrap: wrap;
    }

    .tab {
      padding: 8px 24px;
      cursor: pointer;
      border: 1px solid #2a2a2a;
      border-bottom: none;
      color: #555;
      background: #0f0f0f;
      letter-spacing: 1px;
      font-family: inherit;
      font-size: 12px;
      transition: all 0.15s;
    }

    .tab:hover { color: #aaa; border-color: #3a3a3a; }

    .tab.active { color: #00ff88; border-color: #00ff88; background: #0a0a0a; }
    .tab.btc.active { color: #f7931a; border-color: #f7931a; }
    .tab.eth.active { color: #627eea; border-color: #627eea; }
    .tab.sui.active { color: #4da2ff; border-color: #4da2ff; }
    .tab.xau.active { color: #ffd700; border-color: #ffd700; }
    .tab.accuracy-tab.active { color: #ff6bef; border-color: #ff6bef; }

    /* ── Panels ───────────────────────────────────── */
    .panel {
      display: none;
      border: 1px solid #2a2a2a;
      padding: 20px;
      background: #0d0d0d;
    }
    .panel.active { display: block; }

    .price-row {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid #1a1a1a;
      flex-wrap: wrap;
    }

    .asset-symbol { font-size: 22px; font-weight: bold; }
    .btc .asset-symbol { color: #f7931a; }
    .eth .asset-symbol { color: #627eea; }
    .sui .asset-symbol { color: #4da2ff; }
    .xau .asset-symbol { color: #ffd700; }

    .price-usd { font-size: 28px; color: #ffffff; }
    .change-positive { color: #00ff88; }
    .change-negative { color: #ff4444; }
    .meta-pill { font-size: 11px; color: #555; margin-left: auto; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .block { border: 1px solid #1e1e1e; padding: 14px; }
    .block-full { border: 1px solid #1e1e1e; padding: 14px; margin-bottom: 12px; }

    .block-label {
      color: #444;
      font-size: 10px;
      letter-spacing: 2px;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .block-value { color: #cccccc; line-height: 1.6; }

    .rsi-bar-wrap { margin-top: 8px; background: #1a1a1a; height: 4px; border-radius: 2px; }
    .rsi-bar { height: 4px; border-radius: 2px; background: #00ff88; transition: width 0.5s; }
    .rsi-bar.overbought { background: #ff4444; }
    .rsi-bar.oversold { background: #4da2ff; }

    .levels { display: flex; gap: 20px; }
    .level-group { flex: 1; }
    .level-label { color: #444; font-size: 10px; letter-spacing: 1px; margin-bottom: 4px; }
    .level-support { color: #00ff88; }
    .level-resistance { color: #ff4444; }

    .bias-badge {
      display: inline-block;
      padding: 2px 10px;
      font-size: 11px;
      letter-spacing: 1px;
      border: 1px solid;
      margin-left: 8px;
    }
    .bias-bullish { color: #00ff88; border-color: #00ff88; }
    .bias-bearish { color: #ff4444; border-color: #ff4444; }
    .bias-neutral  { color: #888; border-color: #888; }

    .updated { color: #333; font-size: 10px; margin-top: 16px; text-align: right; }
    .loading { color: #444; padding: 40px 0; text-align: center; letter-spacing: 2px; }
    .error { color: #ff4444; padding: 20px 0; }

    .asset-type {
      font-size: 9px; letter-spacing: 1px; color: #444;
      padding: 1px 6px; border: 1px solid #222;
      margin-left: 8px; vertical-align: middle;
    }

    .chart-container {
      border: 1px solid #1e1e1e;
      margin-bottom: 12px;
      overflow: hidden;
      position: relative;
      height: 500px;
    }
    .chart-label {
      color: #444; font-size: 10px; letter-spacing: 2px;
      margin-bottom: 8px; text-transform: uppercase;
    }

    /* ══════════════════════════════════════════════════
       ACCURACY PANEL STYLES
       ══════════════════════════════════════════════════ */

    .accuracy-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #1a1a1a;
    }
    .accuracy-header h2 {
      font-size: 18px;
      color: #ff6bef;
      letter-spacing: 2px;
      font-weight: normal;
    }
    .accuracy-header .sub {
      color: #555;
      font-size: 11px;
    }

    /* ── Stat cards row ───────────────────────────── */
    .acc-stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 24px;
    }
    @media (max-width: 600px) {
      .acc-stats-grid { grid-template-columns: 1fr 1fr; }
    }

    .acc-stat-card {
      border: 1px solid #1e1e1e;
      padding: 14px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .acc-stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
    }
    .acc-stat-card.btc::before { background: #f7931a; }
    .acc-stat-card.eth::before { background: #627eea; }
    .acc-stat-card.sui::before { background: #4da2ff; }
    .acc-stat-card.xau::before { background: #ffd700; }

    .acc-stat-symbol {
      font-size: 11px;
      letter-spacing: 2px;
      color: #555;
      margin-bottom: 8px;
    }
    .acc-stat-pct {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 4px;
    }
    .acc-stat-pct.good { color: #00ff88; }
    .acc-stat-pct.mid  { color: #f5a623; }
    .acc-stat-pct.bad  { color: #ff4444; }
    .acc-stat-pct.none { color: #333; }

    .acc-stat-detail {
      font-size: 10px;
      color: #555;
      letter-spacing: 1px;
    }

    /* ── Per-asset accordion ──────────────────────── */
    .acc-asset-section {
      border: 1px solid #1e1e1e;
      margin-bottom: 8px;
    }

    .acc-asset-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      transition: background 0.15s;
      user-select: none;
    }
    .acc-asset-header:hover { background: #111; }

    .acc-asset-header .symbol {
      font-size: 14px;
      font-weight: bold;
      width: 40px;
    }
    .acc-asset-header .symbol.btc { color: #f7931a; }
    .acc-asset-header .symbol.eth { color: #627eea; }
    .acc-asset-header .symbol.sui { color: #4da2ff; }
    .acc-asset-header .symbol.xau { color: #ffd700; }

    .acc-asset-header .mini-stats {
      font-size: 11px;
      color: #666;
      display: flex;
      gap: 16px;
    }

    .acc-asset-header .toggle {
      margin-left: auto;
      color: #444;
      font-size: 11px;
      transition: transform 0.2s;
    }
    .acc-asset-header.open .toggle { transform: rotate(90deg); }

    .acc-asset-body {
      display: none;
      padding: 0 16px 16px;
    }
    .acc-asset-body.open { display: block; }

    /* ── Evaluation table ─────────────────────────── */
    .acc-table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .acc-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      min-width: 600px;
    }
    .acc-table th {
      text-align: left;
      padding: 8px 10px;
      color: #444;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border-bottom: 1px solid #1e1e1e;
      font-weight: normal;
      white-space: nowrap;
    }
    .acc-table td {
      padding: 8px 10px;
      border-bottom: 1px solid #111;
      color: #999;
      vertical-align: top;
    }
    .acc-table tr:hover td { background: #0f0f0f; }

    .acc-table .verdict {
      font-weight: bold;
      letter-spacing: 1px;
      font-size: 10px;
    }
    .verdict-correct { color: #00ff88; }
    .verdict-partial { color: #f5a623; }
    .verdict-incorrect { color: #ff4444; }

    .acc-table .plan-cell {
      max-width: 260px;
      line-height: 1.5;
      color: #777;
    }

    .acc-no-data {
      color: #333;
      padding: 30px 0;
      text-align: center;
      letter-spacing: 2px;
      font-size: 12px;
    }
  </style>
</head>
<body>
<div class="terminal">

  <!-- Sidebar overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span>// MENU</span>
    </div>

    <div class="sidebar-section">Navigation</div>
    <button class="sidebar-item active" onclick="toggleSidebar()">
      <span class="icon">◉</span> Dashboard
    </button>

    <div class="sidebar-section" style="margin-top:12px;">Elliott Wave</div>
    <a class="sidebar-item" href="videos.html">
      <span class="icon">▶</span> Videos
      <span class="arrow">▸</span>
    </a>
    <a class="sidebar-sub" href="videos.html" style="color:#555;">
      More Crypto Online
    </a>

    <div class="sidebar-section" style="margin-top:12px;">Resources</div>
    <button class="sidebar-item" onclick="toggleSidebar()">
      <span class="icon">◈</span> Learn
      <span class="arrow">▸</span>
    </button>
    <a class="sidebar-sub" href="learn.html">
      How the Dashboard Works
    </a>
  </nav>

  <!-- Header -->
  <div class="header">
    <button class="burger" id="burgerBtn" onclick="toggleSidebar()">
      <span></span><span></span><span></span>
    </button>
    <span class="header-title">// CRYPTO MARKET ENGINE</span>
    <span class="header-meta" id="last-refresh">--</span>
  </div>

  <!-- ════════════ TABS ════════════ -->
  <div class="tabs">
    <button class="tab btc active" onclick="switchTab('btc')">BTC</button>
    <button class="tab eth" onclick="switchTab('eth')">ETH</button>
    <button class="tab sui" onclick="switchTab('sui')">SUI</button>
    <button class="tab xau" onclick="switchTab('xau')">XAU</button>
    <button class="tab accuracy-tab" onclick="switchTab('accuracy')">◎ ACCURACY</button>
  </div>

  <!-- ════════════ ASSET PANELS ════════════ -->
  <div id="panel-btc" class="panel btc active"><div class="loading">LOADING BTC DATA...</div></div>
  <div id="panel-eth" class="panel eth"><div class="loading">LOADING ETH DATA...</div></div>
  <div id="panel-sui" class="panel sui"><div class="loading">LOADING SUI DATA...</div></div>
  <div id="panel-xau" class="panel xau"><div class="loading">LOADING XAU DATA...</div></div>

  <!-- ════════════ ACCURACY PANEL ════════════ -->
  <div id="panel-accuracy" class="panel">
    <div class="loading">LOADING ACCURACY DATA...</div>
  </div>

</div>

<script>
  /* ── Sidebar toggle ──────────────────────────── */
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('open');
    document.getElementById('burgerBtn').classList.toggle('open');
  }

  /* ── Dashboard logic ─────────────────────────── */
  const ASSETS = ['btc', 'eth', 'sui', 'xau'];
  const cache = {};
  const chartLoaded = {};
  let accuracyLoaded = false;

  const TV_SYMBOLS = {
    btc: 'BINANCE:BTCUSDT',
    eth: 'BINANCE:ETHUSDT',
    sui: 'BINANCE:SUIUSDT',
    xau: 'OANDA:XAUUSD'
  };

  const ASSET_COLORS = {
    btc: '#f7931a',
    eth: '#627eea',
    sui: '#4da2ff',
    xau: '#ffd700'
  };

  function switchTab(asset) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

    if (asset === 'accuracy') {
      document.querySelector('.tab.accuracy-tab').classList.add('active');
      document.getElementById('panel-accuracy').classList.add('active');
      if (!accuracyLoaded) loadAccuracy();
    } else {
      document.querySelector(`.tab.${asset}`).classList.add('active');
      document.getElementById(`panel-${asset}`).classList.add('active');
      if (!cache[asset]) loadAsset(asset);
      if (!chartLoaded[asset]) {
        setTimeout(() => loadChart(asset), 100);
      }
    }
  }

  function loadChart(asset) {
    const container = document.getElementById(`tv-chart-${asset}`);
    if (!container || chartLoaded[asset]) return;
    chartLoaded[asset] = true;

    const widgetDiv = document.createElement('div');
    widgetDiv.className = 'tradingview-widget-container';
    widgetDiv.style.height = '100%';
    widgetDiv.style.width = '100%';

    const innerDiv = document.createElement('div');
    innerDiv.className = 'tradingview-widget-container__widget';
    innerDiv.style.height = '100%';
    innerDiv.style.width = '100%';
    widgetDiv.appendChild(innerDiv);

    const script = document.createElement('script');
    script.type = 'text/javascript';
    script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
    script.async = true;
    script.textContent = JSON.stringify({
      "autosize": true,
      "symbol": TV_SYMBOLS[asset],
      "interval": "60",
      "timezone": "Etc/UTC",
      "theme": "dark",
      "style": "1",
      "locale": "en",
      "backgroundColor": "rgba(13, 13, 13, 1)",
      "gridColor": "rgba(30, 30, 30, 1)",
      "hide_top_toolbar": false,
      "hide_legend": false,
      "allow_symbol_change": false,
      "save_image": false,
      "calendar": false,
      "studies": ["STD;RSI"],
      "support_host": "https://www.tradingview.com"
    });
    widgetDiv.appendChild(script);
    container.appendChild(widgetDiv);
  }

  async function loadAsset(asset) {
    const panel = document.getElementById(`panel-${asset}`);
    try {
      const res = await fetch(`data/${asset}.json?t=${Date.now()}`);
      if (!res.ok) throw new Error('Data not found');
      const d = await res.json();
      cache[asset] = d;
      renderPanel(asset, d);
    } catch (e) {
      panel.innerHTML = `<div class="error">// ERROR: Could not load ${asset.toUpperCase()} data. Run the update script first.</div>`;
    }
  }

  function renderPanel(asset, d) {
    const panel = document.getElementById(`panel-${asset}`);
    const a = d.analysis;
    const changeClass = d.change_24h >= 0 ? 'change-positive' : 'change-negative';
    const changeSign = d.change_24h >= 0 ? '+' : '';
    const rsi = d.rsi ?? 50;
    const rsiClass = rsi >= 70 ? 'overbought' : rsi <= 30 ? 'oversold' : '';
    const biasClass = `bias-${a.trend_bias ?? 'neutral'}`;
    const support = (a.key_levels?.support ?? []).join(' · ') || '—';
    const resistance = (a.key_levels?.resistance ?? []).join(' · ') || '—';
    const updated = new Date(d.updated_at).toUTCString();
    const isCommodity = asset === 'xau';
    const typeLabel = isCommodity ? 'COMMODITY' : 'CRYPTO';
    const hasRsi = d.rsi !== null && d.rsi !== undefined;
    const priceDecimals = isCommodity ? 2 : (d.price < 1 ? 4 : 2);

    panel.innerHTML = `
      <div class="price-row">
        <span class="asset-symbol">${d.symbol}</span>
        <span class="asset-type">${typeLabel}</span>
        <span class="price-usd">$${Number(d.price).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: priceDecimals})}</span>
        <span class="${changeClass}">${changeSign}${d.change_24h}%</span>
        <span class="bias-badge ${biasClass}">${(a.trend_bias ?? 'neutral').toUpperCase()}</span>
        ${hasRsi ? `<span class="meta-pill">RSI ${rsi}</span>` : ''}
      </div>

      <div class="chart-label">// LIVE CHART</div>
      <div class="chart-container" id="tv-chart-${asset}"></div>

      <div class="grid">
        <div class="block">
          <div class="block-label">${isCommodity ? 'Technical Pattern' : 'Elliott Wave'}</div>
          <div class="block-value">${a.elliott_wave ?? '—'}</div>
        </div>
        <div class="block">
          <div class="block-label">Momentum</div>
          <div class="block-value">${a.momentum ?? '—'}</div>
        </div>
      </div>

      ${hasRsi ? `
      <div class="block-full">
        <div class="block-label">RSI (14) — ${rsi} ${rsiClass ? '· ' + rsiClass.toUpperCase() : ''}</div>
        <div class="rsi-bar-wrap">
          <div class="rsi-bar ${rsiClass}" style="width:${rsi}%"></div>
        </div>
      </div>` : `
      <div class="block-full">
        <div class="block-label">RSI (14)</div>
        <div class="block-value" style="color:#555">— Not available for this asset —</div>
      </div>`}

      <div class="block-full">
        <div class="block-label">Key Levels</div>
        <div class="levels">
          <div class="level-group">
            <div class="level-label">SUPPORT</div>
            <div class="level-support">${support}</div>
          </div>
          <div class="level-group">
            <div class="level-label">RESISTANCE</div>
            <div class="level-resistance">${resistance}</div>
          </div>
        </div>
      </div>

      <div class="block-full">
        <div class="block-label">Trade Plan</div>
        <div class="block-value">${a.trade_plan ?? '—'}</div>
      </div>

      <div class="block-full">
        <div class="block-label">Risk Note</div>
        <div class="block-value" style="color:#ff8844">${a.risk_note ?? '—'}</div>
      </div>

      <div class="updated">// last updated: ${updated}</div>
    `;

    document.getElementById('last-refresh').textContent = `refreshed ${new Date().toLocaleTimeString()}`;
    if (!chartLoaded[asset]) {
      setTimeout(() => loadChart(asset), 100);
    }
  }

  /* ══════════════════════════════════════════════════
     ACCURACY PANEL
     ══════════════════════════════════════════════════ */

  async function loadAccuracy() {
    const panel = document.getElementById('panel-accuracy');
    try {
      const res = await fetch(`data/accuracy.json?t=${Date.now()}`);
      if (!res.ok) throw new Error('Not found');
      const data = await res.json();
      accuracyLoaded = true;
      renderAccuracy(data);
    } catch (e) {
      panel.innerHTML = `
        <div class="accuracy-header">
          <h2>◎ AI ACCURACY TRACKER</h2>
        </div>
        <div class="acc-no-data">
          // NO ACCURACY DATA YET<br><br>
          <span style="color:#555;font-size:11px;">
            The tracker needs at least 24 hours of history to start scoring predictions.<br>
            Your dashboard runs every hour — check back tomorrow.
          </span>
        </div>
      `;
    }
  }

  function renderAccuracy(data) {
    const panel = document.getElementById('panel-accuracy');
    const assets = ['btc', 'eth', 'sui', 'xau'];
    const names = { btc: 'BTC', eth: 'ETH', sui: 'SUI', xau: 'XAU' };

    // ── Stat cards ──
    let statsHtml = '';
    assets.forEach(a => {
      const info = data[a];
      const stats = info?.stats || {};
      const total = stats.total || 0;
      const pct = stats.accuracy_pct ?? 0;
      const pctClass = total === 0 ? 'none' : (pct >= 60 ? 'good' : pct >= 40 ? 'mid' : 'bad');
      const pctDisplay = total === 0 ? '—' : pct + '%';
      const detail = total === 0
        ? 'AWAITING DATA'
        : `${stats.correct}✓  ${stats.partial}~  ${stats.incorrect}✗  of ${total}`;

      statsHtml += `
        <div class="acc-stat-card ${a}">
          <div class="acc-stat-symbol">${names[a]}</div>
          <div class="acc-stat-pct ${pctClass}">${pctDisplay}</div>
          <div class="acc-stat-detail">${detail}</div>
        </div>
      `;
    });

    // ── Per-asset tables ──
    let sectionsHtml = '';
    assets.forEach(a => {
      const info = data[a];
      const evals = info?.evaluations || [];
      const stats = info?.stats || {};
      const total = stats.total || 0;
      const pct = stats.accuracy_pct ?? 0;

      // Build table rows (most recent first)
      let rowsHtml = '';
      const sorted = [...evals].reverse();
      if (sorted.length === 0) {
        rowsHtml = `<tr><td colspan="6" style="text-align:center;color:#333;padding:20px;">No evaluations yet — need 24h of history</td></tr>`;
      } else {
        sorted.forEach(ev => {
          const predTime = new Date(ev.prediction_time);
          const timeStr = predTime.toLocaleString('en-US', {
            month: 'short', day: 'numeric',
            hour: '2-digit', minute: '2-digit', hour12: false
          });

          const changePct = ev.price_change_pct;
          const changeClass = changePct >= 0 ? 'change-positive' : 'change-negative';
          const changeSign = changePct >= 0 ? '+' : '';

          const verdictClass = ev.verdict === 'CORRECT' ? 'verdict-correct'
            : ev.verdict === 'PARTIAL' ? 'verdict-partial' : 'verdict-incorrect';

          const biasColor = ev.predicted_bias === 'bullish' ? '#00ff88'
            : ev.predicted_bias === 'bearish' ? '#ff4444' : '#888';

          const actualColor = ev.actual_direction === 'bullish' ? '#00ff88'
            : ev.actual_direction === 'bearish' ? '#ff4444' : '#888';

          const priceNow = typeof ev.price_now === 'number'
            ? '$' + ev.price_now.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})
            : '—';

          // Truncate trade plan
          const planShort = (ev.trade_plan || '—').length > 120
            ? ev.trade_plan.substring(0, 120) + '…'
            : (ev.trade_plan || '—');

          rowsHtml += `
            <tr>
              <td style="white-space:nowrap;">${timeStr}</td>
              <td style="color:${biasColor};letter-spacing:1px;font-size:10px;">${(ev.predicted_bias || '—').toUpperCase()}</td>
              <td style="color:${actualColor};letter-spacing:1px;font-size:10px;">${(ev.actual_direction || '—').toUpperCase()}</td>
              <td>
                <span class="${changeClass}">${changeSign}${changePct}%</span>
                <span style="color:#444;margin-left:6px;font-size:10px;">→ ${priceNow}</span>
              </td>
              <td><span class="verdict ${verdictClass}">${ev.verdict}</span></td>
              <td class="plan-cell">${planShort}</td>
            </tr>
          `;
        });
      }

      sectionsHtml += `
        <div class="acc-asset-section">
          <div class="acc-asset-header" onclick="toggleAccSection(this)">
            <span class="symbol ${a}">${names[a]}</span>
            <div class="mini-stats">
              <span>${total} evaluated</span>
              <span>${total > 0 ? pct + '% correct' : 'awaiting data'}</span>
            </div>
            <span class="toggle">▸</span>
          </div>
          <div class="acc-asset-body">
            <div class="acc-table-wrap">
              <table class="acc-table">
                <thead>
                  <tr>
                    <th>Predicted at</th>
                    <th>AI Said</th>
                    <th>Actual</th>
                    <th>Price Δ (24h)</th>
                    <th>Verdict</th>
                    <th>Trade Plan</th>
                  </tr>
                </thead>
                <tbody>
                  ${rowsHtml}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      `;
    });

    panel.innerHTML = `
      <div class="accuracy-header">
        <h2>◎ AI ACCURACY TRACKER</h2>
        <span class="sub">// 24h prediction vs. reality</span>
      </div>

      <div class="acc-stats-grid">
        ${statsHtml}
      </div>

      <div style="color:#444;font-size:10px;letter-spacing:2px;margin-bottom:12px;text-transform:uppercase;">
        // Detailed evaluations — click to expand
      </div>

      ${sectionsHtml}

      <div class="updated" style="margin-top:20px;">
        // scoring: CORRECT = bias matched direction · PARTIAL = market was flat · INCORRECT = bias was wrong
      </div>
    `;
  }

  function toggleAccSection(header) {
    header.classList.toggle('open');
    header.nextElementSibling.classList.toggle('open');
  }

  /* ── Initial load ────────────────────────────── */
  loadAsset('btc');
  setTimeout(() => loadAsset('eth'), 500);
  setTimeout(() => loadAsset('sui'), 1000);
  setTimeout(() => loadAsset('xau'), 1500);
</script>
</body>
</html>
